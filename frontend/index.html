    <script>
        // Mapeo de animes por nombre (alt) a ID de anime
        const animeMap = {
            'Demon Slayer': null,
            'Jujutsu Kaisen': null,
            'One Piece': null,
            'Solo Leveling': null,
            'Spy x Family': null,
            'Maria-sama ga Miteru': null,
            'Adachi to Shimamura': null,
            'Yagate Kimi ni Naru': null,
            'Muri Muri': null,
            'Whisper Me a Love Song': null
        };

        // Datos de animes por si no se cargan de la API
        const animeDataFallback = {
            'Demon Slayer': { titulo: 'Demon Slayer', ano_lanzamiento: 2019, estado: 'Finalizado', generos: ['Action', 'Fantasy', 'Shonen'] },
            'Jujutsu Kaisen': { titulo: 'Jujutsu Kaisen', ano_lanzamiento: 2020, estado: 'En emisión', generos: ['Action', 'Fantasy', 'Shonen'] },
            'One Piece': { titulo: 'One Piece', ano_lanzamiento: 1999, estado: 'En emisión', generos: ['Action', 'Adventure', 'Fantasy'] },
            'Solo Leveling': { titulo: 'Solo Leveling', ano_lanzamiento: 2024, estado: 'Próximamente', generos: ['Action', 'Fantasy', 'Adventure'] },
            'Spy x Family': { titulo: 'Spy x Family', ano_lanzamiento: 2022, estado: 'Finalizado', generos: ['Action', 'Comedy', 'Slice of Life'] },
            'Maria-sama ga Miteru': { titulo: 'Maria-sama ga Miteru', ano_lanzamiento: 2004, estado: 'Finalizado', generos: ['Romance', 'Drama'] },
            'Adachi to Shimamura': { titulo: 'Adachi to Shimamura', ano_lanzamiento: 2020, estado: 'Finalizado', generos: ['Romance', 'Slice of Life'] },
            'Yagate Kimi ni Naru': { titulo: 'Yagate Kimi ni Naru', ano_lanzamiento: 2018, estado: 'Finalizado', generos: ['Romance', 'Drama'] },
            'Muri Muri': { titulo: 'Watashi ga Koibito ni Nareru Wake Naijan', ano_lanzamiento: 2023, estado: 'Finalizado', generos: ['Romance', 'Comedy'] },
            'Whisper Me a Love Song': { titulo: 'Whisper Me a Love Song', ano_lanzamiento: 2024, estado: 'En emisión', generos: ['Romance', 'Slice of Life'] }
        };

        async function cargarHeroInfo() {
            try {
                // Cargar animes desde la API
                const response = await fetch(`${window.API_URL}/animes?limit=10`);
                const animes = await response.json();

                // Mapear por nombre
                animes.forEach(anime => {
                    animeMap[anime.titulo] = anime;
                });

                // Buscar coincidencias parciales
                Object.keys(animeMap).forEach(key => {
                    if (!animeMap[key]) {
                        const found = animes.find(a => a.titulo.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(a.titulo.toLowerCase()));
                        if (found) animeMap[key] = found;
                    }
                });

                // Obtener el anime de la primera imagen (Demon Slayer)
                const primerAnime = animeMap['Demon Slayer'] || animeDataFallback['Demon Slayer'];
                actualizarOverlay(primerAnime);
            } catch (error) {
                console.error('Error cargando animes:', error);
                actualizarOverlay(animeDataFallback['Demon Slayer']);
            }
        }

        function actualizarOverlay(anime) {
            if (!anime) return;
            document.getElementById('hero-title').textContent = anime.titulo;
            document.getElementById('hero-info').textContent = `TV Anime • ${anime.ano_lanzamiento || '----'} • ${anime.estado || 'Desconocido'}`;
            document.getElementById('hero-genres').innerHTML = (anime.generos || ['Acción', 'Aventura']).map(g => 
                `<span class="badge bg-danger me-2">${g}</span>`
            ).join('');
        }

        // Escuchar cambios del carrusel
        document.getElementById('heroCarousel').addEventListener('slide.bs.carousel', function (e) {
            const slides = document.querySelectorAll('.carousel-item img');
            const currentImg = slides[e.to];
            if (currentImg) {
                const altName = currentImg.alt;
                const anime = animeMap[altName] || animeDataFallback[altName];
                if (anime) actualizarOverlay(anime);
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', cargarHeroInfo);
    </script>
