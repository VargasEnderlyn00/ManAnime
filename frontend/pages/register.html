<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ManAnime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-white">

    <script src="../js/auth.js"></script>
    <script>
        if (Auth.isAuthenticated()) {
            window.location.href = '../index.html';
        }
    </script>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card bg-dark border-light" style="max-width: 420px; width: 100%;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">🌸 ManAnime</h2>
                    <p class="text-muted">Crea tu cuenta</p>
                </div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre de usuario</label>
                        <input type="text" class="form-control bg-dark text-white border-light" id="username" placeholder="EnderrlynVargas" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control bg-dark text-white border-light" id="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control bg-dark text-white border-light" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control bg-dark text-white border-light" id="nombre_completo" placeholder="Enderlyn Vargas">
                    </div>

                    <button type="submit" class="btn btn-danger w-100 py-3 fw-bold">REGISTRARSE</button>
                </form>

                <div class="text-center mt-4">
                    <p>¿Ya tienes cuenta? 
                        <a href="login.html" class="text-danger text-decoration-none fw-bold">Inicia sesión aquí</a>
                    </p>
                </div>

                <div class="text-center mt-3">
                    <a href="../index.html" class="text-muted small">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nombre_completo = document.getElementById('nombre_completo').value;

            if (!username || !email || !password) {
                alert('Por favor completa los campos obligatorios');
                return;
            }

            const resultado = await hacerRegister(username, email, password, nombre_completo);

            if (resultado.success) {
                // Iniciar sesión automáticamente después del registro
                const loginResult = await hacerLogin(email, password);
                if (loginResult.success) {
                    alert('¡Cuenta creada y sesión iniciada!');
                    window.location.href = '../index.html';
                } else {
                    alert('Cuenta creada. Inicia sesión.');
                    window.location.href = 'login.html';
                }
            } else {
                alert(resultado.error);
            }
        });
    </script>
</body>
</html>
