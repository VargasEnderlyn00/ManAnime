<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - ManAnime</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        #animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }
        .glass-card {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
    </style>
</head>
<body class="text-white">
    <!-- Animated Background Canvas -->
    <canvas id="animated-bg"></canvas>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75 sticky-top" style="z-index: 1000;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">🌸 ManAnime</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../inicio.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link navbar-item-protected" href="animes.html">Animes</a></li>
                    <li class="nav-item"><a class="nav-link navbar-item-protected" href="mangas.html">Mangas</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="carrito.html" class="btn btn-outline-light position-relative">
                        <i class="bi bi-cart3"></i>
                        <span id="contador-carrito-perfil" class="badge bg-danger position-absolute top-0 start-100">0</span>
                    </a>
                    <a href="#" id="btn-logout-perfil" class="btn btn-danger">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Información del Perfil -->
            <div class="col-lg-4">
                <div class="card glass-card text-center p-4">
                    <img src="https://picsum.photos/id/64/150/150" 
                         class="rounded-circle mx-auto mb-3" width="150" alt="Avatar">
                    <h4 id="perfil-nombre">Cargando...</h4>
                    <p class="text-muted" id="perfil-username">@usuario</p>
                    <p><strong>Email:</strong> <span id="perfil-email">email@ejemplo.com</span></p>
                    <button class="btn btn-outline-light w-100 mt-3">Editar Perfil</button>
                </div>
            </div>

            <!-- Contenido del Perfil -->
            <div class="col-lg-8">
                <ul class="nav nav-tabs mb-4" id="perfilTabs">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#listas">Mis Listas</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#compras">Mis Compras</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#favoritos">Favoritos</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- Mis Listas -->
                    <div class="tab-pane fade show active" id="listas">
                        <h5>Mis Listas</h5>
                        <div id="lista-listas">
                            <p class="text-muted">Cargando listas...</p>
                        </div>
                    </div>

                    <!-- Mis Compras -->
                    <div class="tab-pane fade" id="compras">
                        <h5>Mis Compras</h5>
                        <div id="lista-compras">
                            <p class="text-muted">Cargando compras...</p>
                        </div>
                    </div>

                    <!-- Favoritos -->
                    <div class="tab-pane fade" id="favoritos">
                        <h5>Favoritos</h5>
                        <div id="lista-favoritos">
                            <p class="text-muted">Cargando favoritos...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/animated-bg.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const usuario = Auth.getUsuarioActual();

            // Dinamizar datos del perfil desde localStorage
            if (usuario) {
                document.getElementById('perfil-nombre').textContent = usuario.nombre_completo || 'Usuario';
                document.getElementById('perfil-username').textContent = '@' + (usuario.username || '');
                document.getElementById('perfil-email').textContent = usuario.email || '';
            }

            // Inicializar animación y navbar
            AnimatedBackground.init();
            actualizarNavbar();

            // Cargar datos del perfil
            if (Auth.isAuthenticated()) {
                await cargarComprasPerfil();
                await cargarListasPerfil();
                await cargarFavoritosPerfil();
            }

            // Botón cerrar sesión
            const btnLogout = document.getElementById('btn-logout-perfil');
            if (btnLogout) {
                btnLogout.addEventListener('click', (e) => {
                    e.preventDefault();
                    Auth.logout();
                    window.location.href = '../index.html';
                });
            }
        });
    </script>
</body>
</html>
