<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - ManAnime</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">🌸 ManAnime</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="animes.html">Animes</a></li>
                    <li class="nav-item"><a class="nav-link" href="mangas.html">Mangas</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <a href="perfil.html" class="btn btn-outline-light"><i class="bi bi-person-circle"></i></a>
                    <a href="#" id="btn-logout-carrito" class="btn btn-danger">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-4">🛒 Mi Carrito</h1>
        
        <div class="row">
            <!-- Lista de productos en el carrito -->
            <div class="col-lg-8" id="lista-carrito">
                <!-- Se llenará con JavaScript -->
                <p class="text-center text-muted py-5">Tu carrito está vacío</p>
            </div>
            
            <!-- Resumen de compra -->
            <div class="col-lg-4">
                <div class="card bg-dark border-light sticky-top" style="top: 90px;">
                    <div class="card-body">
                        <h5 class="card-title">Resumen de Compra</h5>
                        <hr>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Envío</span>
                            <span class="text-success">Gratis</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between fw-bold fs-5">
                            <span>Total</span>
                            <span id="total">$0.00</span>
                        </div>
                        
                        <button class="btn btn-danger w-100 mt-4 py-3 fw-bold" onclick="procederAlPago()">
                            PROCEDER AL PAGO
                        </button>
                        
                        <a href="mangas.html" class="btn btn-outline-light w-100 mt-2">
                            Seguir Comprando
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>
    <script>
        if (Auth.isAuthenticated()) {
            document.getElementById('btn-logout-carrito').addEventListener('click', (e) => {
                e.preventDefault();
                Auth.logout();
                window.location.href = '../pages/login.html';
            });
        }
    </script>
</body>
</html>
