<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ManAnime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-white">

    <script src="../js/auth.js"></script>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card bg-dark border-light" style="max-width: 420px; width: 100%;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">🌸 ManAnime</h2>
                    <p class="text-muted">Inicia sesión para continuar</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Usuario o Email</label>
                        <input type="text" class="form-control bg-dark text-white border-light" id="email" placeholder="EnderrlynVargas o tu email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control bg-dark text-white border-light" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" checked>
                            <label class="form-check-label">Recordarme</label>
                        </div>
                        <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-danger w-100 py-3 fw-bold">INICIAR SESIÓN</button>
                </form>

                <div class="text-center mt-4">
                    <p>¿No tienes cuenta? 
                        <a href="register.html" class="text-danger text-decoration-none fw-bold">Regístrate aquí</a>
                    </p>
                </div>

                <div class="text-center mt-3">
                    <a href="../index.html" class="text-muted small">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Por favor completa todos los campos');
                return;
            }

            const resultado = await hacerLogin(email, password);

            if (resultado.success) {
                alert('¡Bienvenido!');
                window.location.href = '../index.html';
            } else {
                alert(resultado.error);
            }
        });
    </script>
</body>
</html>
