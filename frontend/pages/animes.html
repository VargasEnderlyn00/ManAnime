<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animes - ManAnime</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">🌸 ManAnime</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="animes.html">Animes</a></li>
                    <li class="nav-item"><a class="nav-link" href="mangas.html">Mangas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Comunidad</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-3">
                    <a href="carrito.html" class="btn btn-outline-light position-relative btn-perfil" style="display: none;">
                        <i class="bi bi-cart3"></i>
                        <span id="contador-carrito" class="badge bg-danger position-absolute top-0 start-100">0</span>
                    </a>
                    <a href="perfil.html" class="btn btn-outline-light btn-perfil" style="display: none;">
                        <i class="bi bi-person-circle"></i>
                    </a>
                    <a href="login.html" class="btn btn-primary btn-login-auth">Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">📺 Catálogo de Animes</h1>

        <!-- Filtros -->
        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="buscar" class="form-control bg-dark text-white" placeholder="Buscar anime...">
            </div>
            <div class="col-md-6">
                <select class="form-select bg-dark text-white" id="filtroGenero">
                    <option value="">Todos los géneros</option>
                </select>
            </div>
        </div>

        <!-- Lista de Animes -->
        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="lista-animes">
            <!-- Las tarjetas se cargarán con JavaScript -->
        </div>
    </div>

    <!-- Modal de Detalle Anime -->
    <div class="modal fade" id="detalleAnimeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content bg-dark text-white border-light">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitulo">Título Anime</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="modalContenido">
                    <!-- Se llena con JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
